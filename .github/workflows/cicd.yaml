name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: netflix_frontend
      ECR_REGISTRY: 793524670489.dkr.ecr.us-east-2.amazonaws.com

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Ensure ECR repository exists
      run: |
        aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
        aws ecr create-repository --repository-name $ECR_REPOSITORY

    - name: Build Docker image
      run: |
        docker build -t netflix_frontend:latest .

    - name: Tag Docker image
      run: |
        docker tag netflix_frontend:latest 793524670489.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:${GITHUB_RUN_NUMBER}
        docker tag netflix_frontend:latest 793524670489.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:latest

    - name: Push Docker image
      run: |
        docker push 793524670489.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:${GITHUB_RUN_NUMBER}
        docker push 793524670489.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:latest
